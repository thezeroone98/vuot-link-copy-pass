<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lấy Mật Khẩu</title>
    <style>
        /* CSS Giao diện Dark Mode */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #1e1e1e; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            color: #e0e0e0;
        }
        .container { 
            text-align: center; 
            background: #2d2d30; 
            padding: 35px 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 380px; 
            border: 1px solid #3e3e42;
        }
        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 20px;
            word-break: break-word; /* Chống tràn chữ nếu tên file quá dài */
            line-height: 1.4;
        }
        .highlight {
            color: #f39c12; /* Màu vàng cam cho tên file nổi bật */
        }
        
        /* Khung hiển thị pass */
        .pass-box-container {
            background-color: #18181a; 
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #passText {
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #4dabf7; 
            word-break: break-all;
            transition: all 0.4s ease;
        }

        .blurred {
            filter: blur(5px);
            opacity: 0.5;
            user-select: none; 
        }

        /* Nút Copy */
        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background-color: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
        button:hover { 
            background-color: #0b5ed7; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled { 
            background-color: #495057; 
            color: #adb5bd;
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        button.success {
            background-color: #198754 !important; 
            box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3) !important;
        }

        #statusMsg { 
            margin-top: 15px; 
            min-height: 20px; 
            font-size: 14px; 
            color: #ff6b6b; 
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="passTitle">Đang tải dữ liệu...</h2>
        
        <div class="pass-box-container">
            <span id="passText" class="blurred">Đang kết nối...</span>
        </div>

        <button id="copyBtn" disabled>Nhấn để copy vào clipboard</button>
        <p id="statusMsg"></p>
    </div>

    <script>
        let fetchedPassword = "";

        document.addEventListener('DOMContentLoaded', async () => {
            const passTitle = document.getElementById('passTitle');
            const passText = document.getElementById('passText');
            const copyBtn = document.getElementById('copyBtn');
            const statusMsg = document.getElementById('statusMsg');

            const urlParams = new URLSearchParams(window.location.search);
            const gistId = urlParams.get('id');

            if (!gistId) {
                passTitle.textContent = "Lỗi kết nối";
                passText.textContent = "Không tìm thấy ID";
                passText.classList.remove('blurred');
                statusMsg.textContent = "Vui lòng kiểm tra lại đường link của bạn!";
                return;
            }

            const rawUrl = `https://gist.githubusercontent.com/thezeroone98/${gistId}/raw`;

            try {
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('Không thể tải dữ liệu từ Gist này!');
                const rawText = await response.text();
                
                // 1. Tách các dòng ra để xử lý
                const lines = rawText.split('\n');
                
                // Lấy dòng đầu tiên (chứa tên file)
                const fileName = lines[0].trim();
                
                // Cập nhật tiêu đề hiển thị tên file màu nổi bật
                passTitle.innerHTML = `Đây là pass của <br><span class="highlight">${fileName}</span>`;

                // 2. Lọc lấy pass
                const passPrefix = "pass 👉 ";
                if (rawText.includes(passPrefix)) {
                    fetchedPassword = rawText.split(passPrefix)[1];
                    fetchedPassword = fetchedPassword.split('\n')[0].trim();
                } else {
                    throw new Error('Định dạng file sai (thiếu "pass 👉 ")');
                }

                passText.textContent = fetchedPassword;
                passText.classList.add('blurred'); 
                copyBtn.disabled = false;

            } catch (error) {
                passTitle.textContent = "Lỗi tải dữ liệu";
                passText.textContent = "Không có pass";
                passText.classList.remove('blurred');
                statusMsg.textContent = error.message;
            }
        });

        document.getElementById('copyBtn').addEventListener('click', async () => {
            if (!fetchedPassword) return;

            const copyBtn = document.getElementById('copyBtn');
            const passText = document.getElementById('passText');
            const originalBtnText = "Nhấn để copy vào clipboard";

            try {
                // Copy vào clipboard
                await navigator.clipboard.writeText(fetchedPassword);
                
                // === CHÚ Ý PHẦN NÀY ===
                // Thay 'ten-file-nhac.mp3' bằng đúng tên file mp3 mà bạn đã upload lên GitHub
                // Ví dụ nếu file của bạn tên là 'ting.mp3' thì sửa thành: new Audio('./ting.mp3')
                const audio = new Audio('./ten-file-nhac.mp3'); 
                
                // Phát nhạc (thêm .catch để bỏ qua lỗi hiển thị nếu trình duyệt chặn tự động phát)
                audio.play().catch(error => console.log("Không thể phát nhạc:", error));
                // =======================

                passText.classList.remove('blurred');
                copyBtn.classList.add('success');
                copyBtn.textContent = "✅ Đã copy thành công!";

                // Đợi 3 giây rồi làm mờ lại
                setTimeout(() => {
                    passText.classList.add('blurred'); 
                    copyBtn.classList.remove('success'); 
                    copyBtn.textContent = originalBtnText;
                }, 3000);

            } catch (err) {
                alert("Lỗi trình duyệt: Không thể copy tự động.");
            }
        });
    </script>

</body>
</html>
