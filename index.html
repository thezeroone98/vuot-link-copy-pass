<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lấy Mật Khẩu</title>
    <style>
        /* CSS Giao diện Dark Mode */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #1e1e1e; 
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            color: #e0e0e0;
        }
        .container { 
            text-align: center; 
            background: #2d2d30; 
            padding: 35px 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 380px; 
            border: 1px solid #3e3e42;
        }
        h2 {
            margin-top: 0;
            font-size: 1.25rem;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 20px;
            word-break: break-word;
            line-height: 1.4;
        }
        .highlight {
            color: #f39c12; 
        }
        
        /* Khung hiển thị pass */
        .pass-box-container {
            background-color: #18181a; 
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #passText {
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #4dabf7; 
            word-break: break-all;
            transition: all 0.4s ease;
        }

        .blurred {
            filter: blur(5px);
            opacity: 0.5;
            user-select: none; 
        }

        /* Nút Copy */
        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background-color: #0d6efd; 
            color: white; 
            border: none; 
            border-radius: 8px; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
        button:hover { 
            background-color: #0b5ed7; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled { 
            background-color: #495057; 
            color: #adb5bd;
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        button.success {
            background-color: #198754 !important; 
            box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3) !important;
        }

        #statusMsg { 
            margin-top: 15px; 
            min-height: 20px; 
            font-size: 14px; 
            color: #ff6b6b; 
        }

        /* CSS tùy chỉnh cho ảnh */
        .cats-container {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            margin-top: 20px;
            min-height: 120px;
        }
        .side-cat {
            width: 80px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            display: none; /* Ẩn mặc định */
            animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popIn {
            0% { transform: scale(0) rotate(-10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        #catRight {
            animation: popInRight 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }
        @keyframes popInRight {
            0% { transform: scale(0) rotate(10deg); opacity: 0; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        #reactionImg {
            width: 50%; /* Chỉnh kích thước to bằng 50% container */
            height: auto;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            cursor: pointer; /* Đổi con trỏ chuột thành hình bàn tay để báo hiệu có thể click */
        }
        #reactionImg:hover {
            transform: scale(1.05);
        }
        #hintText {
            margin-top: 10px;
            font-size: 0.9rem;
            color: #f1c40f;
            font-style: italic;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
    </style>
    <!-- Thêm thư viện hiệu ứng pháo giấy (confetti) -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
</head>
<body>

    <div class="container">
        <h2 id="passTitle">Đang tải dữ liệu...</h2>
        
        <div class="pass-box-container">
            <span id="passText" class="blurred">Đang kết nối...</span>
        </div>

        <button id="copyBtn" disabled>Nhấn để copy vào clipboard</button>
        <p id="statusMsg"></p>

        <!-- Khung chứa ảnh alo vu và meo kho ga 2 bên -->
        <div class="cats-container">
            <img id="catLeft" class="side-cat" src="./meo-kho-ga.png" alt="Mèo trái">
            <img id="reactionImg" src="./alo-vu.webp" alt="Hình ảnh tương tác">
            <img id="catRight" class="side-cat" src="./meo-kho-ga.png" alt="Mèo phải">
        </div>
        
        <!-- Dòng chữ gợi ý -->
        <p id="hintText">Ấn vào ảnh chộ đó sẽ có điều đặc biệt xảy ra 👆</p>
    </div>

    <script>
        let fetchedPassword = "";

        document.addEventListener('DOMContentLoaded', async () => {
            const passTitle = document.getElementById('passTitle');
            const passText = document.getElementById('passText');
            const copyBtn = document.getElementById('copyBtn');
            const statusMsg = document.getElementById('statusMsg');

            const urlParams = new URLSearchParams(window.location.search);
            const gistId = urlParams.get('id');

            if (!gistId) {
                passTitle.textContent = "Lỗi kết nối";
                passText.textContent = "Không tìm thấy ID";
                passText.classList.remove('blurred');
                statusMsg.textContent = "Vui lòng kiểm tra lại đường link của bạn!";
                return;
            }

            const rawUrl = `https://gist.githubusercontent.com/thezeroone98/${gistId}/raw`;

            try {
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('Không thể tải dữ liệu từ Gist này!');
                const rawText = await response.text();
                
                const lines = rawText.split('\n');
                const fileName = lines[0].trim();
                
                passTitle.innerHTML = `Đây là pass của <br><span class="highlight">${fileName}</span>`;

                const passPrefix = "pass 👉 ";
                if (rawText.includes(passPrefix)) {
                    fetchedPassword = rawText.split(passPrefix)[1];
                    fetchedPassword = fetchedPassword.split('\n')[0].trim();
                } else {
                    throw new Error('Định dạng file sai (thiếu "pass 👉 ")');
                }

                passText.textContent = fetchedPassword;
                passText.classList.add('blurred'); 
                copyBtn.disabled = false;

            } catch (error) {
                passTitle.textContent = "Lỗi tải dữ liệu";
                passText.textContent = "Không có pass";
                passText.classList.remove('blurred');
                statusMsg.textContent = error.message;
            }
        });

        // Xử lý sự kiện click vào ảnh alo vu
        document.getElementById('reactionImg').addEventListener('click', () => {
            const reactionImg = document.getElementById('reactionImg');
            // Chỉ phát nhạc và đổi ảnh nếu đang là ảnh alo-vu
            if (reactionImg.src.includes('alo-vu.webp')) {
                const aloVuAudio = new Audio('./alo-vu.mp3');
                aloVuAudio.play().catch(err => console.log("Không thể phát nhạc alo-vu:", err));
                
                // Đổi ảnh sang hình so-qua.webp
                reactionImg.src = './so-qua.webp';

                // Tự động trả về ảnh cũ sau 2 giây để người dùng có thể bấm lại
                setTimeout(() => {
                    if (reactionImg.src.includes('so-qua.webp')) {
                        reactionImg.src = './alo-vu.webp';
                    }
                }, 2000);
            }
        });

        document.getElementById('copyBtn').addEventListener('click', async () => {
            if (!fetchedPassword) return;

            const copyBtn = document.getElementById('copyBtn');
            const passText = document.getElementById('passText');
            const reactionImg = document.getElementById('reactionImg');
            const catLeft = document.getElementById('catLeft');
            const catRight = document.getElementById('catRight');
            const hintText = document.getElementById('hintText');
            const originalBtnText = "Nhấn để copy vào clipboard";

            try {
                // Copy vào clipboard
                await navigator.clipboard.writeText(fetchedPassword);

                // Ẩn dòng chữ gợi ý
                hintText.style.display = 'none';

                // 1. Đổi ảnh sang mèo khô gà ở giữa và hiện 2 ảnh 2 bên
                reactionImg.src = './meo-kho-ga.png';
                catLeft.style.display = 'block';
                catRight.style.display = 'block';

                // Lấy tọa độ của 2 con mèo 2 bên trên màn hình
                const leftRect = catLeft.getBoundingClientRect();
                const rightRect = catRight.getBoundingClientRect();

                // Bắn pháo giấy từ vị trí mèo bên trái (Góc 60 độ chéo vào trong)
                confetti({
                    particleCount: 100,
                    angle: 60,
                    spread: 70,
                    origin: { 
                        x: (leftRect.left + leftRect.width / 2) / window.innerWidth, 
                        y: (leftRect.top + leftRect.height / 2) / window.innerHeight 
                    },
                    zIndex: 9999
                });

                // Bắn pháo giấy từ vị trí mèo bên phải (Góc 120 độ chéo vào trong)
                confetti({
                    particleCount: 100,
                    angle: 120,
                    spread: 70,
                    origin: { 
                        x: (rightRect.left + rightRect.width / 2) / window.innerWidth, 
                        y: (rightRect.top + rightRect.height / 2) / window.innerHeight 
                    },
                    zIndex: 9999
                });

                // 2. Phát nhạc hiện tại
                const audio = new Audio('./cam-on-anh-do-mixi.mp3'); 
                audio.play().catch(error => console.log("Không thể phát nhạc:", error));

                // 3. Phát thêm âm thanh vỗ tay
                const cheerAudio = new Audio('./Crowd-cheering-and-clapping.mp3');
                cheerAudio.play().catch(error => console.log("Không thể phát nhạc vỗ tay:", error));
                
                passText.classList.remove('blurred');
                copyBtn.classList.add('success');
                copyBtn.textContent = "✅ Đã copy thành công!";

                // Đợi 3 giây rồi làm mờ lại và đổi lại ảnh cũ
                setTimeout(() => {
                    passText.classList.add('blurred'); 
                    copyBtn.classList.remove('success'); 
                    copyBtn.textContent = originalBtnText;
                    
                    // Trả lại ảnh ban đầu và ẩn 2 mèo 2 bên
                    reactionImg.src = './alo-vu.webp';
                    catLeft.style.display = 'none';
                    catRight.style.display = 'none';
                    
                    // Hiện lại chữ gợi ý
                    hintText.style.display = 'block';
                }, 3000);

            } catch (err) {
                alert("Lỗi trình duyệt: Không thể copy tự động.");
            }
        });
    </script>
</body>
</html>
