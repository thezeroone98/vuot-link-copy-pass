<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kho Mật Khẩu Tự Động</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; padding: 20px; box-sizing: border-box;}
        .container { text-align: center; background: white; padding: 30px 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; }
        .pass-item { margin-bottom: 15px; }
        button { width: 100%; padding: 12px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        #message { margin-top: 15px; min-height: 20px; font-weight: bold; font-size: 14px; }
        #loadingText { color: #555; font-style: italic; margin-bottom: 20px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Kho Mật Khẩu Của Tôi</h2>
        
        <div id="loadingText">⏳ Đang tải danh sách mật khẩu từ GitHub...</div>
        <div id="buttonContainer"></div>

        <p id="message"></p>
    </div>

    <script>
        // MÃ GIST CỦA BẠN CHỈ CẦN ĐIỀN ĐÚNG 1 LẦN Ở ĐÂY
        const GIST_ID = '8640ff5b382aa70b509a3a41f1ce2adf';
        
        // Chạy ngay khi mở trang
        document.addEventListener('DOMContentLoaded', loadGistFiles);

        async function loadGistFiles() {
            const container = document.getElementById('buttonContainer');
            const loadingText = document.getElementById('loadingText');

            try {
                // Gọi API của GitHub để lấy thông tin Gist
                const response = await fetch(`https://api.github.com/gists/${GIST_ID}`);
                if (!response.ok) throw new Error('Không thể tải Gist. Vui lòng kiểm tra lại GIST_ID.');
                
                const data = await response.json();
                const files = data.files; // Lấy danh sách các file trong Gist

                // Ẩn chữ "Đang tải"
                loadingText.style.display = 'none';

                // Duyệt qua từng file và tự động tạo nút
                for (const filename in files) {
                    const rawUrl = files[filename].raw_url;
                    
                    // Tạo thẻ div bọc ngoài
                    const div = document.createElement('div');
                    div.className = 'pass-item';

                    // Tạo nút bấm
                    const btn = document.createElement('button');
                    btn.innerText = `Copy Pass: ${filename}`; // Lấy tên file làm tên nút
                    
                    // Gắn sự kiện click cho nút
                    btn.onclick = function() {
                        copyPass(rawUrl, btn);
                    };

                    // Gắn nút vào div, gắn div vào web
                    div.appendChild(btn);
                    container.appendChild(div);
                }

            } catch (error) {
                loadingText.innerText = '❌ Lỗi: ' + error.message;
                loadingText.style.color = 'red';
            }
        }

        // Hàm xử lý copy giống hệt như trước
        async function copyPass(rawUrl, btnElement) {
            const messageEl = document.getElementById('message');
            const originalText = btnElement.innerText;

            try {
                btnElement.disabled = true;
                btnElement.innerText = "Đang lấy pass...";

                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('Lỗi tải nội dung file');
                const rawText = await response.text();
                
                const passPrefix = "pass 👉 ";
                let cleanPassword = "";
                
                if (rawText.includes(passPrefix)) {
                    cleanPassword = rawText.split(passPrefix)[1];
                    cleanPassword = cleanPassword.split('\n')[0].trim();
                } else {
                    throw new Error('Không tìm thấy ký hiệu "pass 👉"');
                }

                await navigator.clipboard.writeText(cleanPassword);

                messageEl.textContent = `✅ Đã copy thành công!`;
                messageEl.style.color = '#28a745';
                
            } catch (error) {
                messageEl.textContent = '❌ ' + error.message;
                messageEl.style.color = '#dc3545';
            } finally {
                btnElement.disabled = false;
                btnElement.innerText = originalText;
                setTimeout(() => { messageEl.textContent = ''; }, 3000);
            }
        }
    </script>

</body>
</html>
