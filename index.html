<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lấy Mật Khẩu</title>
    <style>
        body { font-family: Arial, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: #f4f4f9; margin: 0; }
        .container { text-align: center; background: white; padding: 30px 40px; border-radius: 10px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        button { width: 100%; padding: 14px; font-size: 16px; font-weight: bold; cursor: pointer; background-color: #28a745; color: white; border: none; border-radius: 5px; transition: 0.3s; }
        button:hover { background-color: #218838; }
        button:disabled { background-color: #6c757d; cursor: not-allowed; }
        #message { margin-top: 15px; min-height: 20px; font-weight: bold; font-size: 15px; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Lấy Mật Khẩu Giải Nén</h2>
        <button id="copyBtn">Nhấn để Copy Pass</button>
        <p id="message"></p>
    </div>

    <script>
        document.getElementById('copyBtn').addEventListener('click', async () => {
            const messageEl = document.getElementById('message');
            const btn = document.getElementById('copyBtn');
            
            // 1. Lấy ID của Gist từ đường link web
            // Ví dụ link là: .../?id=abc12345 thì gistId sẽ là 'abc12345'
            const urlParams = new URLSearchParams(window.location.search);
            const gistId = urlParams.get('id');

            // Nếu bạn quên không gắn ?id= vào link, sẽ báo lỗi
            if (!gistId) {
                messageEl.textContent = '❌ Lỗi: Đường link không hợp lệ (thiếu ID)!';
                messageEl.style.color = '#dc3545';
                return;
            }

            // 2. Tạo đường link RAW dựa trên tài khoản của bạn và ID đó
            const rawUrl = `https://gist.githubusercontent.com/thezeroone98/${gistId}/raw`;

            try {
                btn.disabled = true;
                btn.innerText = "Đang lấy mật khẩu...";

                // Lấy dữ liệu từ Gist
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('Không tìm thấy dữ liệu từ link này!');
                const rawText = await response.text();
                
                // Cắt lấy đúng phần sau "pass 👉 "
                const passPrefix = "pass 👉 ";
                let cleanPassword = "";
                
                if (rawText.includes(passPrefix)) {
                    cleanPassword = rawText.split(passPrefix)[1];
                    cleanPassword = cleanPassword.split('\n')[0].trim();
                } else {
                    throw new Error('Định dạng file không đúng (thiếu "pass 👉 ")');
                }

                // Copy
                await navigator.clipboard.writeText(cleanPassword);

                messageEl.textContent = '✅ Đã copy mật khẩu thành công!';
                messageEl.style.color = '#28a745';
                
            } catch (error) {
                messageEl.textContent = '❌ ' + error.message;
                messageEl.style.color = '#dc3545';
            } finally {
                btn.disabled = false;
                btn.innerText = "Nhấn để Copy Pass";
                setTimeout(() => { messageEl.textContent = ''; }, 3000);
            }
        });
    </script>

</body>
</html>
