<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lấy Mật Khẩu</title>
    <style>
        /* CSS Giao diện Dark Mode cực đẹp */
        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            background-color: #1e1e1e; /* Nền tối */
            margin: 0; 
            padding: 20px;
            box-sizing: border-box;
            color: #e0e0e0;
        }
        .container { 
            text-align: center; 
            background: #2d2d30; /* Xám nhạt (trong dải màu tối) */
            padding: 35px 40px; 
            border-radius: 12px; 
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5); 
            width: 100%; 
            max-width: 380px; 
            border: 1px solid #3e3e42;
        }
        h2 {
            margin-top: 0;
            font-size: 1.4rem;
            color: #ffffff;
            font-weight: 600;
            margin-bottom: 20px;
        }
        
        /* Khung hiển thị pass */
        .pass-box-container {
            background-color: #18181a; /* Nền hộp pass tối hơn */
            border: 1px solid #3e3e42;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
            min-height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #passText {
            font-family: monospace;
            font-size: 1.1rem;
            letter-spacing: 1px;
            color: #4dabf7; /* Màu chữ xanh sáng */
            word-break: break-all;
            transition: all 0.4s ease;
        }

        /* Class dùng để làm mờ 50% bằng Javascript */
        .blurred {
            filter: blur(5px);
            opacity: 0.5;
            user-select: none; /* Không cho bôi đen khi đang mờ */
        }

        /* Nút Copy màu xanh dương */
        button { 
            width: 100%; 
            padding: 14px; 
            font-size: 16px; 
            font-weight: bold; 
            cursor: pointer; 
            background-color: #0d6efd; /* Xanh dương chuẩn */
            color: white; 
            border: none; 
            border-radius: 8px; 
            transition: all 0.2s ease; 
            box-shadow: 0 4px 10px rgba(13, 110, 253, 0.3);
        }
        button:hover { 
            background-color: #0b5ed7; 
            transform: translateY(-2px);
            box-shadow: 0 6px 15px rgba(13, 110, 253, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled { 
            background-color: #495057; 
            color: #adb5bd;
            cursor: not-allowed; 
            box-shadow: none;
            transform: none;
        }
        
        /* Hiệu ứng khi copy thành công */
        button.success {
            background-color: #198754 !important; /* Đổi sang xanh lá */
            box-shadow: 0 4px 10px rgba(25, 135, 84, 0.3) !important;
        }

        /* Thông báo trạng thái nhỏ ở dưới */
        #statusMsg { 
            margin-top: 15px; 
            min-height: 20px; 
            font-size: 14px; 
            color: #ff6b6b; /* Màu đỏ nhạt cho lỗi */
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Pass là:</h2>
        
        <div class="pass-box-container">
            <span id="passText" class="blurred">Đang kết nối...</span>
        </div>

        <button id="copyBtn" disabled>Nhấn để copy vào clipboard</button>
        <p id="statusMsg"></p>
    </div>

    <script>
        // Biến lưu trữ mật khẩu sau khi tải về thành công
        let fetchedPassword = "";

        // Chạy ngay khi mở trang web
        document.addEventListener('DOMContentLoaded', async () => {
            const passText = document.getElementById('passText');
            const copyBtn = document.getElementById('copyBtn');
            const statusMsg = document.getElementById('statusMsg');

            // Lấy ID từ link (Ví dụ: ?id=8640ff5b382aa70b509a3a41f1ce2adf)
            const urlParams = new URLSearchParams(window.location.search);
            const gistId = urlParams.get('id');

            if (!gistId) {
                passText.textContent = "Lỗi: Không tìm thấy ID";
                passText.classList.remove('blurred');
                statusMsg.textContent = "Vui lòng kiểm tra lại đường link của bạn!";
                return;
            }

            const rawUrl = `https://gist.githubusercontent.com/thezeroone98/${gistId}/raw`;

            try {
                // Tải dữ liệu từ Gist
                const response = await fetch(rawUrl);
                if (!response.ok) throw new Error('Không thể tải dữ liệu từ Gist này!');
                const rawText = await response.text();
                
                // Lọc lấy pass
                const passPrefix = "pass 👉 ";
                if (rawText.includes(passPrefix)) {
                    fetchedPassword = rawText.split(passPrefix)[1];
                    fetchedPassword = fetchedPassword.split('\n')[0].trim();
                } else {
                    throw new Error('Định dạng file sai (thiếu "pass 👉 ")');
                }

                // Điền pass vào khung và làm mờ nó
                passText.textContent = fetchedPassword;
                passText.classList.add('blurred'); // Kích hoạt CSS làm mờ 50%
                
                // Bật nút Copy
                copyBtn.disabled = false;

            } catch (error) {
                passText.textContent = "Lỗi tải pass";
                passText.classList.remove('blurred');
                statusMsg.textContent = error.message;
            }
        });

        // Xử lý khi nhấn nút Copy
        document.getElementById('copyBtn').addEventListener('click', async () => {
            if (!fetchedPassword) return;

            const copyBtn = document.getElementById('copyBtn');
            const passText = document.getElementById('passText');
            const originalBtnText = "Nhấn để copy vào clipboard";

            try {
                // Thực hiện copy vào clipboard
                await navigator.clipboard.writeText(fetchedPassword);

                // Hiệu ứng 1: Bỏ làm mờ pass để người dùng nhìn thấy
                passText.classList.remove('blurred');

                // Hiệu ứng 2: Đổi màu và chữ của nút
                copyBtn.classList.add('success');
                copyBtn.textContent = "✅ Đã copy thành công!";

                // Sau 3 giây, trả mọi thứ về trạng thái cũ
                setTimeout(() => {
                    passText.classList.add('blurred'); // Làm mờ lại
                    copyBtn.classList.remove('success'); // Trả về màu xanh dương
                    copyBtn.textContent = originalBtnText;
                }, 3000);

            } catch (err) {
                alert("Lỗi trình duyệt: Không thể copy tự động.");
            }
        });
    </script>

</body>
</html>
